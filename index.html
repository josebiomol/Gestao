<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestao</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F2F3F1;--card:#fff;--text:#16181B;--text-soft:#6B7280;--border:#E7E8E6;--green:#16A34A;--green-bg:#E7F6EC;--danger:#DC2626;--shadow:0 1px 2px rgba(16,18,20,.04),0 8px 24px rgba(16,18,20,.06)}
  [data-theme=dark]{--bg:#131417;--card:#1C1E22;--text:#F2F3F1;--text-soft:#8A8F98;--border:#2A2D32;--green:#22C55E;--green-bg:rgba(34,197,94,.14);--danger:#F87171;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;justify-content:center;transition:background .2s,color .2s}
  .app{width:100%;max-width:440px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
  .lb{position:fixed;top:0;left:0;height:3px;width:0%;background:var(--green);z-index:100;opacity:0;transition:width .3s,opacity .3s}
  .lb.active{opacity:1;animation:lp 1.8s ease-in-out infinite}
  .lb.done{width:100%!important;opacity:0;transition:width .2s,opacity .4s ease .2s;animation:none}
  @keyframes lp{0%{width:0%}30%{width:50%}70%{width:80%}100%{width:90%}}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px}
  .topbar-left{display:flex;align-items:center;gap:8px}
  .app-title{font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;margin:0}
  .hh-badge{background:var(--green-bg);color:var(--green);font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px;cursor:pointer;border:none;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
  .topbar-actions{display:flex;align-items:center;gap:8px;position:relative}
  .icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .av-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--green);color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;background-size:cover;background-position:center;overflow:hidden}
  .acc-menu{position:absolute;top:100%;right:0;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:12px;padding:14px;min-width:170px;z-index:20;margin-top:8px}
  .acc-name{margin:0;font-weight:600;font-size:14px}
  .acc-role{margin:2px 0 10px;font-size:11px;text-transform:uppercase;color:var(--green);letter-spacing:.4px}
  .acc-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;margin-bottom:6px}
  .acc-btn:hover{border-color:var(--green);color:var(--green)}
  .acc-logout{width:100%;background:transparent;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px}
  .acc-logout:hover{border-color:var(--danger);color:var(--danger)}
  .auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
  .auth-icon{width:64px;height:64px;border-radius:20px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:18px}
  .auth-screen h1{font-family:'Archivo',sans-serif;font-size:22px;margin:0 0 6px}
  .auth-screen p{color:var(--text-soft);font-size:13px;margin:0 0 24px;line-height:1.5}
  .auth-screen form{width:100%;display:flex;flex-direction:column;gap:10px}
  .auth-div{display:flex;align-items:center;gap:10px;margin:4px 0;width:100%}
  .auth-div span{font-size:12px;color:var(--text-soft);white-space:nowrap}
  .auth-div hr{flex:1;border:none;border-top:1px solid var(--border)}
  .btn-sec{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);padding:13px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer}
  .btn-sec:hover{border-color:var(--green);color:var(--green)}
  .btn-back{background:none;border:none;color:var(--text-soft);font-size:13px;cursor:pointer;margin-top:8px;text-decoration:underline}
  input[type=email],input[type=text],input[type=number],input[type=password],input[type=color],input[type=file]{width:100%;font-family:'Inter',sans-serif;font-size:14px;border:1px solid var(--border);background:var(--card);color:var(--text);padding:13px 14px;border-radius:12px}
  input[type=color]{height:44px;padding:8px 14px}
  input[type=file]{padding:10px 14px;cursor:pointer}
  input[type=time]{font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--border);background:var(--card);color:var(--text);padding:8px 10px;border-radius:8px;width:90px}
  input:focus{outline:2px solid var(--green);outline-offset:1px}
  ::placeholder{color:var(--text-soft)}
  select{width:100%;font-family:'Inter',sans-serif;font-size:14px;border:1px solid var(--border);background:var(--card);color:var(--text);padding:13px 14px;border-radius:12px}
  button{font-family:'Inter',sans-serif;cursor:pointer}
  .btn-p{width:100%;background:var(--green);color:#fff;border:none;padding:13px;border-radius:12px;font-weight:600;font-size:14px}
  .btn-p:hover{filter:brightness(.95)}
  .btn-p:disabled{opacity:.6;cursor:default}
  /* Household screen */
  .hh-screen{flex:1;display:flex;flex-direction:column;padding:20px 20px 90px}
  .hh-screen h2{font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;margin:0 0 4px}
  .hh-screen .sub{font-size:13px;color:var(--text-soft);margin:0 0 20px}
  .hh-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .hh-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s}
  .hh-card:hover{border-color:var(--green)}
  .hh-name{font-weight:700;font-size:15px}
  .hh-meta{font-size:12px;color:var(--text-soft);margin-top:2px}
  .hh-acts{display:flex;gap:8px}
  .hh-ab{background:none;border:none;color:var(--text-soft);font-size:15px;padding:4px;cursor:pointer}
  .hh-ab:hover{color:var(--green)}.hh-ab.del:hover{color:var(--danger)}
  .hh-add{width:100%;background:var(--green-bg);color:var(--green);border:none;padding:14px;border-radius:14px;font-weight:600;font-size:14px;margin-top:4px}
  /* Main app */
  .main{flex:1;padding:4px 20px 90px}
  /* Add form */
  .add-form-wrap{margin:10px 0 16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
  .add-row1{display:flex;gap:8px;align-items:center}
  .add-row1 input{flex:1;padding:11px 14px;font-size:14px}
  .add-btn{width:42px;height:42px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .expand-btn{width:34px;height:34px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-soft);font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .2s}
  .expand-btn.open{transform:rotate(90deg)}
  .hidden{display:none !important}
  .add-extra{display:none;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .add-extra.hidden{display:none!important}
  .qty-unit-row{display:flex;gap:8px}
  .qty-unit-row input{flex:1}
  .unit-sel{width:90px;flex-shrink:0;padding:11px 8px;font-size:13px}
  /* Category pills */
  .cat-pills-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .cat-pills-wrap::-webkit-scrollbar{display:none}
  .cat-pills{display:flex;gap:6px;white-space:nowrap}
  .cat-pill{border:none;padding:6px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text-soft);border:1px solid var(--border);white-space:nowrap;transition:all .15s}
  .cat-pill.selected{border-color:transparent;color:#fff}
  /* Filter */
  .filter-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .search-wrap{display:flex;align-items:center;width:100%;gap:8px;order:3}
  .search-wrap input{flex:1;min-width:120px;padding:8px 12px;font-size:13px;height:34px}
  .search-clear{background:none;border:none;color:var(--text-soft);padding:4px 8px;cursor:pointer;font-size:14px;line-height:1}
  .search-clear:hover{color:var(--green)}
  .tabs{display:flex;gap:6px;flex:1;order:1}
  .tab{background:var(--card);border:1px solid var(--border);color:var(--text-soft);padding:8px 10px;border-radius:10px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .tab.active{background:var(--green-bg);color:var(--green);border-color:transparent;font-weight:600}
  .tab-count{background:rgba(120,120,120,.15);border-radius:5px;padding:1px 5px;font-size:11px}
  .tab.active .tab-count{background:var(--green);color:#fff}
  .group-toggle{background:none;border:1px solid var(--border);color:var(--text-soft);padding:8px 10px;border-radius:10px;font-size:12px;white-space:nowrap;order:2}
  .group-toggle.active{background:var(--green-bg);color:var(--green);border-color:transparent}
  .status-filters button{padding:6px 10px;border:1px solid var(--border);background:transparent;color:var(--text-soft);border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap;transition:all 0.2s}
  .status-filters button.active{background:var(--green);color:#fff;border-color:var(--green)}
  /* Items */
  .sec-label{font-size:11px;font-weight:700;color:var(--text-soft);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
  ul.items{list-style:none;margin:0 0 8px;padding:0;display:flex;flex-direction:column;gap:6px}
  .item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
  .item.checked{opacity:.5}
  .item-check{width:20px;height:20px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .item.checked .item-check{background:var(--green);border-color:var(--green);color:#fff;font-size:13px}
  .item-info{flex:1;min-width:0}
  .item-name{font-weight:500;font-size:14px;margin:0}
  .item-meta{font-size:11px;color:var(--text-soft);margin:2px 0 0}
  .item-cat{display:inline-block;background:var(--border);color:var(--text-soft);padding:2px 6px;border-radius:4px;font-size:10px;margin-right:4px}
  .item-actions{display:flex;gap:6px;flex-shrink:0}
  .item-action{background:none;border:none;color:var(--text-soft);font-size:14px;padding:4px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .item-action:hover{color:var(--green)}
  .item-action.del:hover{color:var(--danger)}
  .item-action.sel{background:rgba(120,120,120,.15);border-radius:6px}
  .item.selected .item-action.sel{background:var(--green-bg);color:var(--green)}
  /* Empty state */
  .empty{text-align:center;padding:32px 20px;color:var(--text-soft)}
  .empty-icon{font-size:32px;margin-bottom:8px}
  .empty-text{font-size:14px}
  /* FAB */
  .fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;background:var(--green);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(22,163,74,.3);z-index:40}
  .fab:hover{filter:brightness(.95)}
  .fab:active{transform:scale(.95)}
  /* Modals */
  .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50;animation:slideUp .3s ease-out}
  @keyframes slideUp{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
  .modal.hidden{display:none}
  .modal-content{background:var(--card);width:90%;max-width:550px;border-radius:14px;padding:16px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
  .modal-title{font-family:'Archivo',sans-serif;font-size:18px;font-weight:800;margin:0 0 12px}
  .modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-soft);font-size:18px;cursor:pointer}
  .modal-close:hover{color:var(--text)}
  .modal-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-form .form-group:nth-child(1){grid-column:1 / -1}
  .modal-form .form-group:nth-child(4){grid-column:1 / -1}
  .modal-form .form-group:nth-child(4) > div{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-start}
  .modal-form .form-group:nth-child(4) > div button{flex:0 1 calc(33.333% - 5px);font-size:12px;padding:6px 8px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:12px;font-weight:600;color:var(--text-soft);text-transform:uppercase;letter-spacing:.3px}
  .form-group input,.form-group select,.form-group textarea{padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-family:'Inter',sans-serif;font-size:14px}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--green);outline-offset:1px}
  .form-group textarea{resize:vertical;min-height:80px}
  .modal-actions{display:flex;gap:8px;margin-top:8px}
  .modal-actions button{flex:1;padding:11px;border-radius:10px;border:none;font-weight:600;font-size:14px;cursor:pointer}
  .modal-actions .btn-p{background:var(--green);color:#fff}
  .modal-actions .btn-sec{background:var(--card);border:1px solid var(--border);color:var(--text)}
  /* Toast */
  #toast{position:fixed;bottom:20px;left:20px;background:var(--card);color:var(--text);padding:12px 16px;border-radius:10px;border:1px solid var(--border);box-shadow:var(--shadow);max-width:280px;opacity:0;transition:opacity .3s;z-index:60;display:none}
  #toast.show{opacity:1;display:block}
  #toast.success{border-left:4px solid var(--green)}
  #toast.danger{border-left:4px solid var(--danger)}
  #toast.loading{border-left:4px solid var(--green)}
  /* Status messages */
  .status-msg{text-align:center;color:var(--text-soft);padding:20px;font-size:14px}
  /* Error */
  .err{color:var(--danger);font-size:12px;margin-top:4px;display:none}
  .err.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="lb" id="lb"></div>
  
  <!-- Login Screen -->
  <div id="loginScreen" class="auth-screen">
    <div class="auth-icon">🔐</div>
    <h1>Gestão Multi-loja</h1>
    <p>Faça login para acessar suas listas</p>
    
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="E-mail" required>
      <input type="password" id="loginSenha" placeholder="Senha" required>
      <button type="submit" class="btn-p">Entrar</button>
    </form>
    
    <button class="btn-back" onclick="showRegister()">Criar nova conta</button>
  </div>

  <!-- Register Screen -->
  <div id="registerScreen" class="auth-screen hidden">
    <div class="auth-icon">🚀</div>
    <h1>Criar Conta</h1>
    <p>Configure sua primeira organização</p>
    
    <form id="registerForm">
      <input type="email" id="regEmail" placeholder="E-mail" required>
      <input type="text" id="regNome" placeholder="Seu nome" required>
      <input type="text" id="regNomeOrg" placeholder="Nome da organização" required>
      <input type="text" id="regNomeHH" placeholder="Nome da primeira loja" required>
      <input type="password" id="regSenha" placeholder="Senha (min 6 caracteres)" required>
      <button type="submit" class="btn-p">Criar Conta</button>
    </form>
    
    <button class="btn-back" onclick="showLogin()">Voltar ao login</button>
  </div>

  <!-- App Screen -->
  <div id="appScreen" class="hidden" style="display:flex;flex-direction:column;flex:1">
    <div class="topbar">
      <div class="topbar-left">
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="showHouseholds()" title="Selecionar outra loja">
          <span style="font-size:24px">🏠</span>
          <h1 class="app-title">Gestão</h1>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
          <span id="hhIcon" style="font-size:20px;display:none">🏪</span>
          <button class="hh-badge" id="hhBtn" style="display:none"></button>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeBtn" title="Tema" onclick="toggleTheme()">🌙</button>
        <button class="icon-btn" id="settingsBtn" title="Configurações">⚙️</button>
        <div style="position:relative">
          <button class="av-btn" id="avBtn" title="Perfil"></button>
          <div class="acc-menu hidden" id="accMenu">
            <p class="acc-name" id="accName"></p>
            <p class="acc-role" id="accRole"></p>
            <button class="acc-btn" id="profileBtn">Perfil</button>
            <button class="acc-logout" id="logoutBtn">Sair</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Households Screen -->
    <div id="householdsView" class="hh-screen hidden">
      <h2>Minhas Lojas</h2>
      <p class="sub">Selecione uma loja para gerenciar</p>
      <div class="hh-list" id="hhList"></div>
      <button class="hh-add" id="createHHBtn" style="display:none">+ Nova loja</button>
    </div>

    <!-- Main App Screen -->
    <div id="mainView" class="main hidden">
      <div class="filter-row">
        <div class="status-filters" id="statusFilters" style="display:flex;gap:6px;align-items:center"></div>
        <button class="group-toggle" id="groupToggle" onclick="toggleGroupByCategory()">Agrupar</button>
        <button class="icon-btn" id="addBtn" onclick="openAddItem()" title="Adicionar item" style="width:34px;height:34px;font-size:16px">➕</button>
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Buscar..." style="padding:8px 12px">
          <button class="search-clear" id="searchClear" style="display:none">✕</button>
        </div>
      </div>
      
      <div class="cat-pills-wrap">
        <div class="cat-pills" id="catPills"></div>
      </div>

      <div id="content"></div>

      <button class="fab hidden" id="fab">➕</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modals -->
<!-- Add Item Modal -->
<div id="addItemModal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" onclick="closeAddItem()">✕</button>
    <h2 class="modal-title">Novo Item</h2>
    <form id="addItemForm" class="modal-form">
      <div class="form-group">
        <label>Nome do item *</label>
        <input type="text" id="itemNome" placeholder="Ex: Leite integral" required>
      </div>
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="itemQtd" placeholder="1" value="1">
      </div>
      <div class="form-group">
        <label>Unidade</label>
        <select id="itemUnit">
          <option>un</option>
          <option>kg</option>
          <option>L</option>
          <option>ml</option>
          <option>g</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="itemCat">
          <option value="">Geral</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-p">Adicionar</button>
        <button type="button" class="btn-sec" onclick="closeAddItem()">Cancelar</button>
      </div>
      <div class="err" id="addItemErr"></div>
    </form>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h2 class="modal-title">Configurações</h2>
    <div class="modal-form">
      <p style="color:var(--text-soft);font-size:13px">Versão 3.0 com segurança aprimorada</p>
    </div>
  </div>
</div>

<!-- Segurança v3.0 -->
<script src="js/security/encryption.js"></script>
<script src="js/security/sessionManager.js"></script>
<script src="js/security/permissions.js"></script>
<script src="js/middleware/authMiddleware.js"></script>
<script src="js/middleware/permissionMiddleware.js"></script>
<script src="js/middleware/rateLimiter.js"></script>

<!-- Seu arquivo principal -->
<script src="js/main.js"></script>
</body>
</html>
